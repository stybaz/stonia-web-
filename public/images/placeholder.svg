  <!-- Camera icon -->
  <g transform="translate(400, 260)" opacity="0.35">
    <rect x="-44" y="-30" width="88" height="66" rx="8" fill="none" stroke="#ed622a" stroke-width="3"/>
    <circle cx="0" cy="3" r="18" fill="none" stroke="#ed622a" stroke-width="3"/>
    <rect x="-10" y="-30" width="20" height="10" rx="3" fill="#ed622a" opacity="0.6"/>
    <circle cx="28" cy="-18" r="4" fill="#ed622a" opacity="0.5"/>
  </g>
