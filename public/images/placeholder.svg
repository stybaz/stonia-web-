  <text x="400" y="355" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" opacity="0.55" text-anchor="middle" letter-spacing="0.5">Fotografie</text>
  <text x="400" y="382" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.3" text-anchor="middle" letter-spacing="1">brzy přidáme</text>
  <!-- Bottom accent line -->
